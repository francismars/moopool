version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: mupool-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mupool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mupool-redis
    ports:
      - "6379:6379"

  api:
    image: node:22
    container_name: mupool-api
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @mupool/api dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mupool
      REDIS_URL: redis://redis:6379
      SIGNING_SECRET: mupool-dev-secret
      PORT: 4000
      HOST: 0.0.0.0
    ports:
      - "4000:4000"
    volumes:
      - ../:/app
    depends_on:
      - postgres
      - redis

  worker:
    image: node:22
    container_name: mupool-worker
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @mupool/worker dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mupool
      REDIS_URL: redis://redis:6379
    volumes:
      - ../:/app
    depends_on:
      - postgres
      - redis

  dashboard:
    image: node:22
    container_name: mupool-dashboard
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @mupool/dashboard dev -- --host 0.0.0.0 --port 4173"
    environment:
      VITE_API_BASE: http://localhost:4000/api/v1
    ports:
      - "4173:4173"
    volumes:
      - ../:/app
    depends_on:
      - api

volumes:
  postgres_data:
