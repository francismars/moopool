name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-replay:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mupool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mupool
      REDIS_URL: redis://localhost:6379
      SIGNING_SECRET: mupool-dev-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @mupool/db migrate
      - run: pnpm --filter @mupool/db seed
      - run: pnpm test
      - run: pnpm --filter @mupool/db replay:check
